<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      background: transparent;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Vignette — carried on line-1 so it fades in with the opening. -->
  <div style="
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(14,10,7,0.30) 0%, rgba(14,10,7,0) 70%);
    pointer-events: none;
  "></div>

  <!-- Line 1: "You have been waiting to feel ready." -->
  <!-- 52px / 1.3lh = 68px line box. Step=90px. -->
  <!-- Block: 6×90+68=608px. Center y=875. Top=875-304=571px. -->
  <div style="
    position: absolute;
    left: 80px;
    width: 920px;
    top: 571px;
    text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 52px;
    line-height: 1.3;
    letter-spacing: -0.5px;
    white-space: nowrap;
    color: #F0EAD9;
    -webkit-text-stroke: 1.5px #0F0802;
    paint-order: stroke fill;
  ">You have been waiting to feel ready.</div>

</body>
</html>
